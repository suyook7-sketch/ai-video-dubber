<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Video Dubber V2</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

<h1>🎬 AI Video Dubber</h1>

<input type="file" id="video" accept="video/*">

<select id="lang">
<option>Hindi</option>
<option>English</option>
<option>Spanish</option>
<option>French</option>
<option>Arabic</option>
</select>

<select id="voice">
  <option value="female">👩 Female Voice</option>
  <option value="male">👨 Male Voice</option>
</select>
  
<button onclick="startDub()">
🚀 Start Dubbing
</button>
  
<video id="preview" controls style="width:100%;margin-top:20px;display:none;border-radius:10px;"></video>

<div id="progress" style="margin-top:20px;display:none;">
  <progress id="bar" value="0" max="100" style="width:100%;"></progress>
</div>

<button id="downloadBtn" style="display:none;margin-top:20px;">
⬇️ Download Dubbed Video
</button>
  
<p id="status">Select a video to begin.</p>

</div>

<script src="script.js"></script>

</body>
</html>
